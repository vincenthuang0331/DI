name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj
      
    - name: Build
      run: dotnet build InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj -c Release --no-restore
      
    - name: Run tests
      run: dotnet test InfraStack.Utility.Dependency.Test/InfraStack.Utility.Dependency.Test.csproj -c Release --no-build --verbosity normal
      
    - name: Pack
      run: dotnet pack InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj -c Release --no-build -o packages
      
    - name: Publish to GitHub Packages
      run: dotnet nuget push "packages/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload NuGet Package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: packages/*.nupkg
