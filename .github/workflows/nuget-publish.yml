name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag
      id: get_version
      run: |
        if [ "${{ github.ref_type }}" == "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0.0-dev"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: $VERSION"
        
    - name: Restore dependencies
      run: dotnet restore InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj
      
    - name: Build
      run: dotnet build InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj -c Release --no-restore  /p:Version=${{ steps.get_version.outputs.version }}
      
    - name: Run tests
      run:  dotnet test InfraStack.Utility.Dependency.Tests/InfraStack.Utility.Dependency.Tests.csproj -c Release --no-build --verbosity normal
      
    - name: Pack
      run: dotnet pack InfraStack.Utility.Dependency/InfraStack.Utility.Dependency.csproj -c Release --no-build -o packages /p:PackageVersion=${{ steps.get_version.outputs.version }}
      
    - name: Publish to GitHub Packages
      run: dotnet nuget push "packages/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload NuGet Package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: packages/*.nupkg
